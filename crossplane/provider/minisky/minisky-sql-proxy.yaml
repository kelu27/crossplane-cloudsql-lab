apiVersion: v1
kind: ConfigMap
metadata:
  name: minisky-sql-proxy
  namespace: crossplane-system
data:
  nginx.conf: |
    events {}

    http {
      server {
        listen 8080;

        location / {
          proxy_pass http://host.k3d.internal:8080;
          proxy_http_version 1.1;
          proxy_set_header Host sqladmin.googleapis.com;
          proxy_set_header Connection "";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minisky-sql-proxy
  namespace: crossplane-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minisky-sql-proxy
  template:
    metadata:
      labels:
        app: minisky-sql-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.29.8-alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: minisky-sql-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: minisky-sql-proxy
  namespace: crossplane-system
spec:
  selector:
    app: minisky-sql-proxy
  ports:
    - name: http
      port: 8080
      targetPort: 8080